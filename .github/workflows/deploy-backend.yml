name: Deploy Python Backend to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'devjudge-backend/**'

env:
  AZURE_FUNCTIONAPP_NAME: 'devjudge'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './devjudge-backend'
  PYTHON_VERSION: '3.10' 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab your code from the repository
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      # 2. Install Python on the GitHub server
      - name: 'Setup Python ${{ env.PYTHON_VERSION }} Environment'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 3. Go into the backend folder, upgrade pip, and install requirements into the Azure-specific folder
      - name: 'Resolve Project Dependencies'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      # 4. Take the built code and shove it into Azure using your secret key
      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
